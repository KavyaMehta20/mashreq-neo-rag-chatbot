<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mashreq Neo Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-content">
                <h1>MASHREQ NEO CHATBOT</h1>
                <p>Your AI Banking Assistant</p>
            </div>
        </header>
        
        <main class="chat-box" id="chat-box">
            <div class="message system-message">
                <div class="message-bubble">
                    Hello! I'm the Mashreq NEO Assistant. How can I help you today?
                </div>
            </div>
        </main>
        
        <footer class="chat-input-area">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Ask me about Mashreq NEO products..." autocomplete="off" required>
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
